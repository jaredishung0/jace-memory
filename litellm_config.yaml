# LiteLLM Proxy Configuration
# Route: litellm --config litellm_config.yaml --port 4000
# SQLite by default — no Postgres needed

model_list:
  # ── LLM Providers ────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Memory Bank (custom endpoint) ────────────────────────────
  # Agents call this like any model. Responses = JSON of matching memories.
  - model_name: memory-bank
    litellm_params:
      model: openai/memory-bank
      api_base: http://127.0.0.1:8001/v1
      api_key: fake-key-not-used
      max_tokens: 4096
      temperature: 0.0

  # ── Embeddings (for future semantic recall) ──────────────────
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
